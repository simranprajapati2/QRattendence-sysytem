<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate QR Codes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
        }

        table {
            background: white;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            📱 Generate QR Codes
        </h2>

        <table class="table table-bordered table-hover text-center align-middle">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>QR Code</th>
                </tr>
            </thead>

            <tbody>

                {% if students %}
                    {% for s in students %}
                    <tr>
                        <td>{{ s[0] }}</td>
                        <td>{{ s[1] }}</td>
                        <td>{{ s[2] }}</td>
                        <td>
                            <a href="/generate_qr/{{ s[2] }}"
                               target="_blank"
                               class="btn btn-primary btn-sm">
                                Generate QR
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-danger">
                            No Students Found
                        </td>
                    </tr>
                {% endif %}

            </tbody>

        </table>

        <div class="text-center mt-3">
            <a href="/dashboard" class="btn btn-dark">
                ⬅ Back to Dashboard
            </a>
        </div>

    </div>

</div>

</body>
</html>
