<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border-radius:15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">📋 Attendance Report</span>

        <div>
            <a href="/export" class="btn btn-success btn-sm">
                Export CSV
            </a>

            <a href="/dashboard" class="btn btn-light btn-sm">
                Back
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h3 class="text-center mb-4">
            Student Attendance Records
        </h3>

        <div class="table-responsive">

            <table class="table table-bordered table-striped text-center">

                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Date</th>
                        <th>Time</th>
                    </tr>
                </thead>

                <tbody>

                    {% if data %}
                        {% for row in data %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                            <td>{{ row[2] }}</td>
                            <td>
                                {% if row[3] %}
                                    {{ row[3] }}
                                {% else %}
                                    -
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4">
                                No Attendance Records Found
                            </td>
                        </tr>
                    {% endif %}

                </tbody>

            </table>

        </div>

        <hr>

        <h4 class="text-center mb-3">
            Attendance Graph
        </h4>

        <canvas id="attendanceChart"></canvas>

    </div>

</div>

<script>
    
    
const labels = {{ data | map(attribute=0) | list | tojson }};
const values = {{ data | map(attribute=1) | list | tojson }};

if (labels.length > 0) {
    new Chart(document.getElementById('attendanceChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Attendance Count',
                data: values,
                backgroundColor: '#0d6efd'
            }]
        }
    });
}

</script>

</body>
</html>
