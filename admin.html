<!DOCTYPE html>

<html>
<head>
    
    <title>Admin Panel</title>


<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet">


</head>
<body>

<div class="container mt-5">


<h2 class="mb-4">Admin Panel</h2>

<!-- Add Student Form -->
<form method="POST" action="/add_student" class="mb-4">
    <div class="row">

        <div class="col">
            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Student Name"
                required>
        </div>

        <div class="col">
            <input
                type="text"
                name="roll_no"
                class="form-control"
                placeholder="Roll No"
                required>
        </div>

        <div class="col">
            <button class="btn btn-success">
                Add Student
            </button>
        </div>

    </div>
</form>

<!-- Students Table -->
<table class="table table-bordered table-striped">

    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Roll No</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
    {% for s in students %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>
                <a href="/delete_student/{{ s[0] }}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
    {% endfor %}
    </tbody>

</table>

<a href="/dashboard" class="btn btn-primary">
    Back to Dashboard
</a>


</div>

</body>
</html>
