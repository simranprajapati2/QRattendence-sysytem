<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Ranking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
        }

        .card{
            border-radius:15px;
        }

        .top{
            background:#d4edda;
        }

        .low{
            background:#f8d7da;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🏆 Student Attendance Ranking</h2>

            <a href="/dashboard" class="btn btn-dark">
                Back to Dashboard
            </a>
        </div>

        <table class="table table-bordered table-hover text-center">

            <thead class="table-dark">
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Roll No</th>
                    <th>Attendance %</th>
                </tr>
            </thead>

            <tbody>

                {% if students %}

                    {% for s in students %}
                    <tr class="{% if s.percent >= 75 %}top{% else %}low{% endif %}">
                        <td>#{{ loop.index }}</td>
                        <td>{{ s.name }}</td>
                        <td>{{ s.roll }}</td>
                        <td>{{ s.percent }}%</td>
                    </tr>
                    {% endfor %}

                {% else %}

                    <tr>
                        <td colspan="4">No Student Data Available</td>
                    </tr>

                {% endif %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
