<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Control</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            max-width: 600px;
            margin: auto;
            margin-top: 60px;
            border-radius: 15px;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            ⏰ Attendance Time Control
        </h2>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Start Time</label>
                <input
                    type="time"
                    name="start_time"
                    class="form-control"
                    value="{{ timing[0] if timing else '' }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">End Time</label>
                <input
                    type="time"
                    name="end_time"
                    class="form-control"
                    value="{{ timing[1] if timing else '' }}"
                    required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Save Timing
            </button>

        </form>

        <hr>

        <div class="text-center">
            <h5>Current Attendance Timing</h5>

            {% if timing %}
                <p>
                    <strong>Start:</strong> {{ timing[0] }}
                    <br>
                    <strong>End:</strong> {{ timing[1] }}
                </p>
            {% else %}
                <p>No timing set.</p>
            {% endif %}

            <a href="/dashboard" class="btn btn-dark">
                ← Back to Dashboard
            </a>
        </div>

    </div>

</div>

</body>
</html>
