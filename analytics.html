<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            background:#f4f6f9;
        }
        .card-box{
            padding:20px;
            border-radius:12px;
            color:white;
        }
        .green{background:#28a745;}
        .blue{background:#007bff;}
        .orange{background:#fd7e14;}
    </style>
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">📊 Attendance Analytics Dashboard</h2>

    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card-box green">
                <h5>Total Students</h5>
                <h3>{{ total_students }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box blue">
                <h5>Highest Attendance</h5>
                <h3>{{ highest }}%</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box orange">
                <h5>Records</h5>
                <h3>{{ data|length }}</h3>
            </div>
        </div>

    </div>

    <div class="card p-3 shadow">
        <table class="table table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Present Days</th>
                    <th>Attendance %</th>
                </tr>
            </thead>

            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}%</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="card p-4 mt-4 shadow">
        <h5>Attendance Chart</h5>
        <canvas id="myChart"></canvas>
    </div>

</div>

<script>
const labels = [
{% for row in data %}
"{{ row[0] }}",
{% endfor %}
];

const values = [
{% for row in data %}
{{ row[2] }},
{% endfor %}
];

if(labels.length > 0){
    new Chart(document.getElementById('myChart'), {
        type:'bar',
        data:{
            labels:labels,
            datasets:[{
                label:'Attendance %',
                data:values,
                backgroundColor:'#007bff'
            }]
        }
    });
}
</script>

</body>
</html>
